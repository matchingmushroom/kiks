name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next
      - name: Install dependencies
        run: npm ci
      - name: Build with Next.js
        id: build
        continue-on-error: true
        run: |
          npm run build 2>&1 | tee build-output.log
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
          exit ${PIPESTATUS[0]}
        env:
          PAGE_URL: ${{ steps.pages.outputs.base_url }}
          NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyBWYuU_UpuHhgvbG9KjaSIvQxazWpeIXZE
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: kiks-collections.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: kiks-collections
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: kiks-collections.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: 65464734921
          NEXT_PUBLIC_FIREBASE_APP_ID: 1:65464734921:web:b491b270f83704acfe2918
          NEXT_PUBLIC_WHATSAPP_NUMBER: 9779849171833
      - name: Show build log
        if: always()
        run: |
          echo "## Build output (last 100 lines)" >> $GITHUB_STEP_SUMMARY
          tail -100 build-output.log >> $GITHUB_STEP_SUMMARY
          echo "Exit code: ${{ steps.build.outputs.exitcode }}" >> $GITHUB_STEP_SUMMARY
          cat build-output.log
          exit ${{ steps.build.outputs.exitcode || 0 }}
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
